<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: transparent;
  padding: 40px;
}
.card-container {
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 8px 40px rgba(74, 55, 40, 0.12);
  padding: 32px 28px 24px;
  max-width: 380px;
  width: 100%;
}
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: #FF8B5E;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon svg {
  width: 24px;
  height: 24px;
  fill: white;
}
.header-text .app-name {
  font-weight: 800;
  font-size: 17px;
  color: #4A3728;
  line-height: 1.2;
}
.header-text .label {
  font-weight: 700;
  font-size: 11px;
  color: #FF8B5E;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.word-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}
.word-card {
  display: flex;
  align-items: center;
  border-radius: 16px;
  padding: 8px 12px;
  border-left: 4px solid;
  transition: transform 0.15s ease;
}
.word-card:hover {
  transform: scale(1.02);
}
.word-img {
  width: 72px;
  height: 72px;
  border-radius: 12px;
  object-fit: cover;
  margin-right: 14px;
  flex-shrink: 0;
}
.word-info {
  flex: 1;
}
.word-name {
  font-weight: 800;
  font-size: 17px;
  color: #4A3728;
  line-height: 1.2;
}
.word-desc {
  font-weight: 400;
  font-size: 13px;
  color: #8B7355;
  line-height: 1.3;
}
.play-btn {
  width: 36px;
  height: 36px;
  background: #FFFFFF;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(74, 55, 40, 0.1);
  flex-shrink: 0;
  margin-left: 8px;
}
.play-btn svg {
  width: 14px;
  height: 14px;
  fill: #4A3728;
  margin-left: 2px;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid #F0E8E0;
}
.footer-label {
  font-weight: 700;
  font-size: 12px;
  color: #8B7355;
  letter-spacing: 0.5px;
}
.footer-count {
  font-weight: 800;
  font-size: 13px;
  color: #FF8B5E;
}
.progress-bar {
  width: 100%;
  height: 5px;
  background: #F0E8E0;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF8B5E, #FFB088);
  border-radius: 999px;
  width: 100%;
}
</style>
</head>
