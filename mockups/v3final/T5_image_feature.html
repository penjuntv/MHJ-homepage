<!doctype html>
<html lang="ko"><head>
<meta charset="UTF-8" />
<title>T5 image-feature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Inter:wght@500;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
.zone-main {
  padding: 0 !important;
}

.photo-area {
  width: 100%;
  position: relative;
}
body.format-4x5 .photo-area .photo-frame { height: 540px; }
body.format-9x16 .photo-area .photo-frame { height: 720px; }

.text-area {
  flex: 1;
  padding: 50px var(--pad-side) 0;
  display: flex;
  flex-direction: column;
}

.kicker {
  font-family: var(--font-en);
  font-size: var(--fs-small);
  font-weight: 800;
  letter-spacing: 0.22em;
  color: var(--accent-primary);
  text-transform: uppercase;
  margin-bottom: 22px;
  display: flex; align-items: center; gap: 14px;
}
.kicker::before {
  content: ""; width: 32px; height: 2px;
  background: var(--accent-primary);
}

body.format-4x5 .title { font-size: 64px; }
body.format-9x16 .title { font-size: 80px; }
.title {
  font-family: var(--font-kr);
  font-weight: 900;
  line-height: 1.18;
  letter-spacing: -0.035em;
  color: var(--ink);
  word-break: keep-all;
  margin-bottom: 28px;
}
.title .accent {
  position: relative;
  display: inline-block;
}
.title .accent::after {
  content: ""; position: absolute;
  left: 0; right: 0; bottom: 6px;
  height: 14px;
  background: var(--accent-highlight);
  z-index: -1;
  border-radius: 2px;
}

body.format-4x5 .body-text { font-size: 32px; }
body.format-9x16 .body-text { font-size: 38px; }
.body-text {
  font-family: var(--font-kr);
  font-weight: 500;
  line-height: 1.55;
  color: var(--ink);
  word-break: keep-all;
  letter-spacing: var(--ls-normal);
}
.body-text strong {
  color: var(--accent-primary);
  font-weight: 800;
}
</style>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const aspect = params.get('aspect') || '4x5';
  document.body.className = `format-${aspect}`;
});
</script>
</head>
<body class="format-4x5">
<div class="card">
  <div class="zone-top">
    <div class="handle"><span class="at">@</span>MHJ_NZ</div>
    <div class="page-indicator">06<span class="total"> / 08</span></div>
  </div>

  <div class="zone-main">
    <div class="photo-area">
      <div class="photo-frame">
        <div class="placeholder-mark">photo · drawing together · morning</div>
      </div>
    </div>

    <div class="text-area">
      <div class="kicker">The Next Morning</div>
      <h2 class="title">
        다음 날 아침 우리는<br>
        <span class="accent">서로를 그렸다</span>
      </h2>
      <div class="body-text">
        나는 내가 사랑하는 아이를, 아이는 자기가 사랑하는 엄마를.
        "이 그림을 보면서 <strong>내가 옆에 있다고 생각해</strong>."
      </div>
    </div>
  </div>

  <div class="zone-bottom">
    <div class="brand-name">@mhj_nz · Term 2 · Week 1</div>
    <div class="swipe-cta">SWIPE</div>
  </div>
</div>
</body></html>
