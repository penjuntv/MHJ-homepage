<!doctype html>
<html lang="ko"><head>
<meta charset="UTF-8" />
<title>T6 outro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Inter:wght@500;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
body.format-4x5 .card,
body.format-9x16 .card {
  background: var(--ink);
}

.zone-top .handle, .zone-top .page-indicator {
  color: var(--on-dark);
}
.zone-top .handle .at, .zone-top .page-indicator .total {
  color: rgba(250, 248, 245, 0.5);
}
.zone-bottom .brand-name { color: rgba(250, 248, 245, 0.55); }
.zone-bottom .swipe-cta { color: var(--on-dark); }

.zone-main {
  justify-content: center;
}

.eyebrow {
  font-family: var(--font-en);
  font-size: 16px; font-weight: 800;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent-primary);
  margin-bottom: 32px;
  display: flex; align-items: center; gap: 16px;
}
.eyebrow::before, .eyebrow::after {
  content: ""; width: 32px; height: 2px;
  background: var(--accent-primary);
}

body.format-4x5 .thanks { font-size: 100px; }
body.format-9x16 .thanks { font-size: 130px; }
.thanks {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 700;
  color: var(--on-dark);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 48px;
}
.thanks .highlight { color: var(--accent-highlight); }

body.format-4x5 .cta-message { font-size: 32px; }
body.format-9x16 .cta-message { font-size: 38px; }
.cta-message {
  font-family: var(--font-kr);
  font-weight: 600;
  line-height: 1.5;
  color: rgba(250, 248, 245, 0.85);
  word-break: keep-all;
  margin-bottom: 56px;
  letter-spacing: -0.015em;
}
.cta-message strong {
  color: var(--accent-highlight);
  font-weight: 800;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 40px;
}
.action-row {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 24px 28px;
  background: rgba(250, 248, 245, 0.08);
  border-left: 4px solid var(--accent-primary);
  border-radius: 0 6px 6px 0;
}
.action-row .icon {
  font-size: 36px;
  font-weight: 900;
  color: var(--accent-primary);
  font-family: var(--font-en);
}
body.format-4x5 .action-row .text { font-size: 26px; }
body.format-9x16 .action-row .text { font-size: 32px; }
.action-row .text {
  font-family: var(--font-kr);
  font-weight: 700;
  color: var(--on-dark);
  letter-spacing: -0.01em;
}
.action-row .text strong {
  color: var(--accent-highlight);
}

.next-up {
  margin-top: auto;
  padding: 28px;
  background: var(--accent-primary);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.next-up .label {
  font-family: var(--font-en);
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.32em;
  color: var(--on-dark);
  opacity: 0.85;
  text-transform: uppercase;
}
body.format-4x5 .next-up .title { font-size: 26px; }
body.format-9x16 .next-up .title { font-size: 32px; }
.next-up .title {
  font-family: var(--font-kr);
  font-weight: 900;
  color: var(--on-dark);
  margin-top: 6px;
}
.next-up .arrow {
  font-size: 56px;
  color: var(--on-dark);
  font-weight: 100;
}
</style>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const aspect = params.get('aspect') || '4x5';
  document.body.className = `format-${aspect}`;
});
</script>
</head>
<body class="format-4x5">
<div class="card">
  <div class="zone-top">
    <div class="handle"><span class="at">@</span>MHJ_NZ</div>
    <div class="page-indicator">08<span class="total"> / 08</span></div>
  </div>

  <div class="zone-main">
    <div class="eyebrow">— Thank you for reading</div>

    <h1 class="thanks">
      이 글이<br>
      <span class="highlight">마음에 들었다면</span>
    </h1>

    <div class="cta-message">
      <strong>저장해두세요</strong> — 다음에도 생각날 거예요.<br>
      그리고 친구에게 보내주세요.
    </div>

    <div class="actions">
      <div class="action-row">
        <span class="icon">♡</span>
        <span class="text"><strong>좋아요</strong>로 응원해주세요</span>
      </div>
      <div class="action-row">
        <span class="icon">↗</span>
        <span class="text">전문은 <strong>mhj.nz/journal</strong>에서</span>
      </div>
    </div>

    <div class="next-up">
      <div>
        <div class="label">Next up</div>
        <div class="title">다음 편 · ESR Form 읽는 법</div>
      </div>
      <div class="arrow">→</div>
    </div>
  </div>

  <div class="zone-bottom">
    <div class="brand-name">@mhj_nz · Mairangi Bay</div>
    <div class="swipe-cta">END</div>
  </div>
</div>
</body></html>
