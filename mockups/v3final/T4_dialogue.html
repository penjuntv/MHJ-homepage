<!doctype html>
<html lang="ko"><head>
<meta charset="UTF-8" />
<title>T4 dialogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css">
<style>
.label-box-wrap { margin-bottom: 50px; }

.qa-stack {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Silent pause indicator - dramatic effect */
.silence-dots {
  margin: 50px auto 0;
  display: flex;
  gap: 14px;
  justify-content: center;
}
.silence-dots .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent-primary);
  opacity: 0.5;
}
.bubble {
  padding: 28px 36px;
  border-radius: 14px;
  font-family: var(--font-en);
  font-style: italic;
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.15;
  word-break: keep-all;
}
.bubble .speaker {
  display: block;
  font-family: var(--font-kr);
  font-style: normal;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.7;
}

body.format-4x5 .bubble.q { font-size: 76px; max-width: 78%; }
body.format-4x5 .bubble.a { font-size: 64px; max-width: 50%; }
body.format-9x16 .bubble.q { font-size: 96px; max-width: 82%; }
body.format-9x16 .bubble.a { font-size: 80px; max-width: 55%; }

.bubble.q {
  align-self: flex-start;
  background: var(--accent-primary);
  color: var(--on-dark);
  box-shadow: 6px 6px 0 var(--ink);
}
.bubble.q .speaker { color: rgba(250, 248, 245, 0.85); }
.bubble.a {
  align-self: flex-end;
  background: rgba(26, 44, 66, 0.10);
  color: var(--ink);  /* solid ink for readability */
  text-align: right;
  border: 2px solid rgba(26, 44, 66, 0.32);
  opacity: 0.85;  /* slight fade but text stays readable */
}
.bubble.a .speaker { color: var(--ink); opacity: 0.55; }

.reveal-block {
  margin-top: auto;  /* push to bottom of zone-main */
  padding: 36px 40px;
  background: var(--ink);
  color: var(--on-dark);
  border-radius: 6px;
  position: relative;
}
.reveal-block::before {
  content: "BUT";
  position: absolute;
  top: -16px; left: 32px;
  background: var(--accent-highlight);
  color: var(--ink);
  font-family: var(--font-en);
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.32em;
  padding: 6px 16px;
  border-radius: 2px;
}
.reveal-block .text {
  font-family: var(--font-kr);
  font-weight: 700;
  line-height: 1.42;
  word-break: keep-all;
  letter-spacing: -0.015em;
}
body.format-4x5 .reveal-block .text { font-size: 36px; }
body.format-9x16 .reveal-block .text { font-size: 44px; }

.reveal-block .text em {
  font-style: normal;
  background: var(--accent-highlight);
  color: var(--ink);
  padding: 0 8px;
  font-weight: 900;
}
</style>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const aspect = params.get('aspect') || '4x5';
  document.body.className = `format-${aspect}`;
});
</script>
</head>
<body class="format-4x5">
<div class="card">
  <div class="zone-top">
    <div class="handle"><span class="at">@</span>MHJ_NZ</div>
    <div class="page-indicator">05<span class="total"> / 08</span></div>
  </div>

  <div class="zone-main">
    <div class="label-box-wrap">
      <div class="label-box"><div class="text">The Reveal</div></div>
    </div>

    <div class="qa-stack">
      <div class="bubble q"><span class="speaker">Jin</span>"Can I play?"</div>
      <div class="bubble a"><span class="speaker">친구</span>"No."</div>
    </div>

    <div class="silence-dots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <div class="reveal-block">
      <div class="text">
        그래도 학교가 재미있었다고 했다.<br>
        <em>"엄마 옆에 있다고 상상했거든."</em>
      </div>
    </div>
  </div>

  <div class="zone-bottom">
    <div class="brand-name">@mhj_nz · Term 2 · Week 1</div>
    <div class="swipe-cta">SWIPE</div>
  </div>
</div>
</body></html>
